<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Помилка оплати | Ілона Солдатюк</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --brand-cream: #FFF8F0;
            --brand-charcoal: #2D2926;
            --brand-gold: #C4956A;
            --brand-red: #E57373;
        }
        body { 
            background-color: var(--brand-cream); 
            color: var(--brand-charcoal); 
            font-family: 'Inter', sans-serif; 
        }
        h1 { font-family: 'Playfair Display', serif; }
        .btn-dark {
            background: linear-gradient(135deg, #4A4543 0%, #2D2926 100%);
            box-shadow: 0 10px 30px -10px rgba(45, 41, 38, 0.3);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 relative overflow-hidden">

    <!-- Background Decor -->
    <div class="absolute top-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-red-500/5 rounded-full blur-[100px] pointer-events-none z-0"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-brand-gold/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <div class="max-w-lg w-full text-center relative z-10">
        
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-red-100 border border-red-200 text-red-500 mb-8">
            <i data-lucide="x-circle" class="w-10 h-10"></i>
        </div>
        
        <h1 class="text-4xl md:text-5xl font-semibold mb-6 uppercase tracking-tight">Помилка оплати</h1>
        <p class="text-brand-charcoal/70 mb-10 text-lg font-light leading-relaxed">
            На жаль, платіж був відхилений банком або платіжною системою. Будь ласка, спробуйте ще раз або використайте іншу карту.
        </p>
        
        <a href="index.html" class="btn-dark inline-flex items-center justify-center w-full py-5 text-white font-bold rounded-full text-sm tracking-[0.2em] transition-all transform hover:scale-[1.02] active:scale-[0.98] uppercase">
            ПОВЕРНУТИСЬ НА ГОЛОВНУ
            <i data-lucide="refresh-cw" class="w-4 h-4 ml-3"></i>
        </a>

        <p class="mt-8 text-xs text-brand-charcoal/40 font-medium tracking-widest uppercase">
            Код замовлення: <span class="text-brand-gold" id="display-order">---</span>
        </p>
    </div>

    <script>
        lucide.createIcons();
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('display-order').textContent = urlParams.get('order') || 'Невідомо';
    </script>
</body>
</html>
