<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата успішна | Ілона Солдатюк</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --brand-cream: #FFF8F0;
            --brand-charcoal: #2D2926;
            --brand-gold: #C4956A;
        }
        body { 
            background-color: var(--brand-cream); 
            color: var(--brand-charcoal); 
            font-family: 'Inter', sans-serif; 
        }
        h1 { font-family: 'Playfair Display', serif; }
        .btn-gold {
            background: linear-gradient(135deg, #C4956A 0%, #B38459 100%);
            box-shadow: 0 10px 30px -10px rgba(196, 149, 106, 0.5);
        }
    </style>

    <!-- Facebook Pixel Code -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const purchaseValue = parseFloat(urlParams.get('value')) || 390.00;
        const PIXEL_ID = '1148154676646876';

        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        
        fbq('init', PIXEL_ID);
        fbq('track', 'PageView');
        fbq('track', 'Purchase', {
            value: purchaseValue,
            currency: 'UAH'
        });
    </script>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 relative overflow-hidden">

    <!-- Background Decor -->
    <div class="absolute top-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-brand-gold/5 rounded-full blur-[100px] pointer-events-none z-0"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-brand-gold/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <div class="max-w-lg w-full text-center relative z-10">
        
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-brand-gold/10 border border-brand-gold/20 text-brand-gold mb-8">
            <i data-lucide="check" class="w-10 h-10"></i>
        </div>
        
        <h1 class="text-4xl md:text-5xl font-semibold mb-6 uppercase tracking-tight">Оплата успішна</h1>
        <p class="text-brand-charcoal/70 mb-10 text-lg font-light leading-relaxed">
            Дякую за довіру. Я зв'яжусь із тобою найближчим часом. А поки приєднуйся до мого Telegram-каналу, щоб почати трансформацію вже зараз.
        </p>
        
        <a href="https://t.me/+Yzn1hDcxK1YwYjQ6" target="_blank" class="btn-gold inline-flex items-center justify-center w-full py-5 text-white font-bold rounded-full text-sm tracking-[0.2em] transition-all transform hover:scale-[1.02] active:scale-[0.98] uppercase">
            ПЕРЕЙТИ В TELEGRAM
            <i data-lucide="arrow-right" class="w-4 h-4 ml-3"></i>
        </a>

        <p class="mt-8 text-xs text-brand-charcoal/40 font-medium tracking-widest uppercase">
            Сума оплати: <span class="text-brand-gold" id="display-price">--- ₴</span>
        </p>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('display-price').textContent = purchaseValue + ' ₴';
    </script>
</body>
</html>
